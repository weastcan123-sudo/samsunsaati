<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsun İftar Vakti 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --accent: #f97316;
  --bg: #0a0a0a;
  --surface: #131313;
  --border: #222;
  --text: #f0f0f0;
  --muted: #888;
  --dim: #444;
}

body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

header {
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg); z-index: 99;
}
.logo { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -.02em; }
.logo span { color: var(--accent); }
.header-right { display: flex; gap: 8px; }
.hbtn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; color: var(--muted);
  font-size: 12px; padding: 6px 13px;
  cursor: pointer; transition: all .15s; font-family: inherit; font-weight: 500;
}
.hbtn:hover { border-color: #3a3a3a; color: #ccc; }
.hbtn.on { color: var(--accent); border-color: var(--accent); background: #1a0d00; }

#fw { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #1a1a1a; border: 1px solid #333; border-radius: 10px;
  padding: 11px 24px; font-size: 13px; font-weight: 500; color: #eee;
  opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 998; white-space: nowrap;
}
.toast.show { opacity: 1; }

.container { max-width: 680px; margin: 0 auto; padding: 0 24px; }

.hero { padding: 40px 0 36px; border-bottom: 1px solid var(--border); }
.hero-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
.hero-date { font-size: 13px; color: var(--muted); }
.hero-gun { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 4px; }
.hero-hava { font-size: 12px; color: var(--dim); text-align: right; }
.hero-hava span { color: var(--muted); }

.cd-label { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
.hero-title { font-size: 32px; font-weight: 700; color: #fff; letter-spacing: -.03em; margin-bottom: 4px; }
.hero-vakit { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 22px; }

.countdown { display: flex; align-items: baseline; margin-bottom: 6px; }
.cd-part { display: flex; flex-direction: column; align-items: center; min-width: 78px; }
.cd-num { font-size: 58px; font-weight: 300; color: #fff; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -.04em; }
.cd-unit { font-size: 10px; color: #383838; text-transform: uppercase; letter-spacing: .14em; margin-top: 6px; font-weight: 700; }
.cd-colon { font-size: 46px; font-weight: 300; color: #252525; padding: 0 2px 14px; }
.cd-pct { font-size: 12px; color: var(--dim); margin-bottom: 16px; }

.progress-wrap { margin-bottom: 32px; }
.progress-track { height: 4px; background: #1c1c1c; border-radius: 4px; overflow: hidden; margin-bottom: 9px; }
.progress-fill { height: 100%; border-radius: 4px; transition: width .9s ease, background .6s; width: 0%; }
.progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: #3a3a3a; font-weight: 500; }

.vakitler-label { font-size: 11px; color: #3a3a3a; text-transform: uppercase; letter-spacing: .12em; font-weight: 700; margin-bottom: 10px; }
.vakitler { display: flex; gap: 5px; }
.vbtn {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 4px; cursor: pointer;
  transition: all .15s; display: flex; flex-direction: column;
  align-items: center; gap: 5px; font-family: inherit;
}
.vbtn:hover { border-color: #333; background: #181818; }
.vbtn.active { border-color: #3a3a3a; background: #1a1a1a; }
.vbtn-name { font-size: 10px; font-weight: 700; color: #3a3a3a; letter-spacing: .05em; }
.vbtn-time { font-size: 12px; font-weight: 600; color: #3a3a3a; }
.vbtn.active .vbtn-name { color: #999; }
.vbtn.active .vbtn-time { color: #ccc; }
.vbtn.auto .vbtn-name { color: var(--accent); }
.vbtn.auto .vbtn-time { color: var(--accent); }

.section { padding: 32px 0; border-bottom: 1px solid var(--border); }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
.tabs { display: flex; gap: 5px; }
.tab {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; color: #555; font-family: inherit;
  font-size: 12px; font-weight: 600; padding: 5px 14px; cursor: pointer; transition: all .15s;
}
.tab:hover { border-color: #333; color: #888; }
.tab.active { border-color: var(--accent); color: var(--accent); background: #1a0900; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #3a3a3a; padding: 9px 10px; text-align: center; border-bottom: 1px solid var(--border); }
td { padding: 10px; text-align: center; font-size: 13px; color: #666; border-bottom: 1px solid #161616; transition: background .1s; }
tbody tr:hover td { background: #111 !important; }
tbody tr.today td { color: #c0c0c0; background: #111; }
tbody tr.today td:first-child { border-left: 2px solid var(--accent); }
.td-date { color: #888 !important; font-weight: 600; }
.td-iftar { color: var(--accent) !important; font-weight: 700; font-size: 14px !important; }
tbody tr.today .td-iftar { color: #fb923c !important; }
.kadir td { font-size: 11px; color: #ea580c !important; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; padding: 9px 10px; border-left: 2px solid #7c2d12; background: #0f0500 !important; }

footer { padding: 24px 0 48px; font-size: 12px; color: #2a2a2a; }
</style>
</head>

</div>

  {n:12,d:"02/03",t:"2026-03-02",i:"05:37",g:"07:01",o:"12:52",ik:"15:59",a:"18:33",y:"19:52",ay:"Mart",k:false},

  {n:25,d:"15/03",t:"2026-03-15",i:"05:15",g:"06:40",o:"12:49",ik:"16:08",a:"18:47",y:"20:07",ay:"Mart",k:false},
  {n:26,d:"16/03",t:"2026-03-16",i:"05:13",g:"06:38",o:"12:48",ik:"16:09",a:"18:49",y:"20:08",ay:"Mart",k:true},
  {n:27,d:"17/03",t:"2026-03-17",i:"05:12",g:"06:37",o:"12:48",ik:"16:09",a:"18:50",y:"20:09",ay:"Mart",k:false},
  {n:28,d:"18/03",t:"2026-03-18",i:"05:10",g:"06:35",o:"12:48",ik:"16:10",a:"18:51",y:"20:11",ay:"Mart",k:false},
  {n:29,d:"19/03",t:"2026-03-19",i:"05:08",g:"06:33",o:"12:48",ik:"16:10",a:"18:52",y:"20:12",ay:"Mart",k:false},
];

const GUNLER=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const AYLAR=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
function todayStr(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function getBugun(){return DATA.find(r=>r.t===todayStr())||null;}
function toMin(s){const[h,m]=s.split(':').map(Number);return h*60+m;}
function getV(b){return[{n:"İMSAK",s:b.i},{n:"GÜNEŞ",s:b.g},{n:"ÖĞLE",s:b.o},{n:"İKİNDİ",s:b.ik},{n:"AKŞAM",s:b.a},{n:"YATSI",s:b.y}];}

const fw=document.getElementById('fw');const fc=fw.getContext('2d');
let pts=[],fwOn=false,fwT=null;
function rsz(){fw.width=innerWidth;fw.height=innerHeight;}rsz();addEventListener('resize',rsz);
class P{constructor(x,y,c){this.x=x;this.y=y;this.c=c;const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp-2;this.g=.12;this.l=1;this.d=.012+Math.random()*.012;this.r=1.5+Math.random()*2.5;}u(){this.vx*=.98;this.vy+=this.g;this.x+=this.vx;this.y+=this.vy;this.l-=this.d;}dr(){fc.beginPath();fc.arc(this.x,this.y,this.r,0,Math.PI*2);fc.fillStyle=this.c.replace('1)',`${this.l})`);fc.fill();}}
function lfw(x,y){const C=['rgba(249,115,22,1)','rgba(239,68,68,1)','rgba(251,191,36,1)','rgba(255,255,255,1)'];const c=C[~~(Math.random()*C.length)];for(let i=0;i<55+~~(Math.random()*30);i++)pts.push(new P(x,y,c));}
function loop(){if(!fwOn){fc.clearRect(0,0,fw.width,fw.height);return;}fc.clearRect(0,0,fw.width,fw.height);pts=pts.filter(p=>p.l>0);pts.forEach(p=>{p.u();p.dr();});requestAnimationFrame(loop);}
function startFW(){fwOn=true;pts=[];let c=0;const iv=setInterval(()=>{lfw(fw.width*.2+Math.random()*fw.width*.6,fw.height*.1+Math.random()*fw.height*.4);if(++c>=16)clearInterval(iv);},400);loop();if(fwT)clearTimeout(fwT);fwT=setTimeout(()=>{fwOn=false;},9000);}

let tT=null;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');if(tT)clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),4000);}

let notifOn=false;
async function bildirimIzniAl(){if(!('Notification'in window))return;if(Notification.permission==='granted'){notifOn=true;return;}if(Notification.permission!=='denied'){const p=await Notification.requestPermission();notifOn=p==='granted';}}
function bildirimGonder(b,m){if(!notifOn)return;try{new Notification(b,{body:m,tag:'vakit',renotify:true});}catch(e){}}
bildirimIzniAl();
async function bildirimToggle(){
  if(!('Notification'in window)){alert('Tarayıcın bildirim desteklemiyor.');return;}
  if(notifOn){notifOn=false;document.getElementById('notif-btn').textContent='🔔 Bildirim';document.getElementById('notif-btn').classList.remove('on');}
  else{await bildirimIzniAl();if(notifOn){document.getElementById('notif-btn').textContent='🔔 Açık ✓';document.getElementById('notif-btn').classList.add('on');bildirimGonder('Bildirimler açık','Vakit gelince haber vereceğim!');}else alert('Tarayıcı ayarlarından bildirim iznini aç.');}
}

async function fetchHava(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.2867&longitude=36.33&current=temperature_2m,weathercode&timezone=Europe%2FIstanbul');
    const d=await r.json();const c=d.current;
    const icons={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',63:'🌧️',71:'🌨️',73:'❄️',80:'🌧️',95:'⛈️'};
    const descs={0:'Açık',1:'Az bulutlu',2:'Parçalı bulutlu',3:'Kapalı',45:'Sisli',51:'Çisenti',61:'Yağmurlu',63:'Yağmurlu',71:'Karlı',73:'Karlı',80:'Sağanak',95:'Fırtınalı'};
    document.getElementById('hava-txt').textContent=`${icons[c.weathercode]||''} ${Math.round(c.temperature_2m)}°C · ${descs[c.weathercode]||''}`;
  }catch(e){document.getElementById('hava-txt').textContent='—';}
}
fetchHava();setInterval(fetchHava,600000);

let manV=null,otoIdx=-1,lastShown=null;

function buildV(bugun,ai){
  const c=document.getElementById('vakitler');c.innerHTML='';
  if(!bugun)return;
  getV(bugun).forEach((v,i)=>{
    const b=document.createElement('button');b.className='vbtn';
    const isAuto=manV===null&&i===ai;
    if(manV===v.n||isAuto)b.classList.add('active');
    if(isAuto)b.classList.add('auto');
    b.innerHTML=`<span class="vbtn-name">${v.n}</span><span class="vbtn-time">${v.s}</span>`;
    b.onclick=()=>{manV=(manV===v.n)?null:v.n;buildV(bugun,otoIdx);};
    c.appendChild(b);
  });
}

function tick(){
  const now=new Date();
  const bugun=getBugun();
  document.getElementById('hero-date').textContent=`${now.getDate()} ${AYLAR[now.getMonth()]} ${now.getFullYear()} · ${GUNLER[now.getDay()]}`;
  document.getElementById('hero-gun').textContent=bugun?`☽ Ramazan'ın ${bugun.n}. günü`:'';

  if(!bugun){
    document.getElementById('hero-title').textContent='Ramazan Dışı';
    ['h','m','s'].forEach(id=>document.getElementById(id).textContent='--');
    document.getElementById('prog').style.width='0%';
    return;
  }

  const vakitler=getV(bugun);
  const nowMin=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  let ai=-1;
  for(let i=0;i<vakitler.length;i++)if(nowMin<toMin(vakitler[i].s)){ai=i;break;}
  otoIdx=ai;

  if(ai>0){const sec=(nowMin-toMin(vakitler[ai-1].s))*60;if(sec>=0&&sec<5&&lastShown!==vakitler[ai-1].n){lastShown=vakitler[ai-1].n;if(vakitler[ai-1].n==='AKŞAM'){startFW();showToast('İftar hayırlı olsun 🌙');bildirimGonder('İftar','Hayırlı iftarlar!');}else{showToast(vakitler[ai-1].n+' vakti girdi');bildirimGonder(vakitler[ai-1].n,'Vakit girdi.');}}}

  let hi=manV!==null?vakitler.findIndex(v=>v.n===manV):ai;
  if(hi===-1)hi=ai;
  buildV(bugun,otoIdx);

  let hedef,prevS,prevN;
  if(hi===-1){const idx=DATA.findIndex(r=>r.t===todayStr());const yn=idx>=0&&idx+1<DATA.length?DATA[idx+1]:null;hedef={n:'İMSAK',s:yn?yn.i:'05:00'};prevS=bugun.y;prevN='YATSI';}
  else{hedef=vakitler[hi];prevS=hi===0?'00:00':vakitler[hi-1].s;prevN=hi===0?'':vakitler[hi-1].n;}

  const[hh,mm]=hedef.s.split(':').map(Number);
  const tgt=new Date(now);tgt.setHours(hh,mm,0,0);if(tgt<=now)tgt.setDate(tgt.getDate()+1);
  const[ph,pm]=prevS.split(':').map(Number);
  const prv=new Date(now);prv.setHours(ph,pm,0,0);if(prv>now)prv.setDate(prv.getDate()-1);

  const diff=tgt-now;
  const pct=Math.max(0,Math.min(1,(now-prv)/(tgt-prv)))*100;
  const isIftar=hedef.n==='AKŞAM';
  const isSahur=hedef.n==='İMSAK';
  const barColor=isIftar?'#f97316':isSahur?'#fb923c':'#ef4444';

  document.getElementById('cd-label').textContent=isIftar?'İFTARA KALAN SÜRE':isSahur?'SAHURA KALAN SÜRE':hedef.n+' VAKTİNE KALAN';
  document.getElementById('hero-title').textContent=isIftar?'İftara Kalan':isSahur?'Sahura Kalan':hedef.n+' Vaktine Kalan';
  document.getElementById('hero-vakit').textContent=hedef.n+' · '+hedef.s;
  document.getElementById('hero-vakit').style.color=barColor;
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog').style.background=barColor;
  document.getElementById('cd-pct').textContent=`%${Math.round(pct)} tamamlandı`;
  document.getElementById('pl-from').textContent=(prevN?prevN+' ':'')+prevS;
  document.getElementById('pl-to').textContent=hedef.n+' '+hedef.s;

  const dH=Math.floor(diff/3600000),dM=Math.floor((diff%3600000)/60000),dS=Math.floor((diff%60000)/1000);
  document.getElementById('h').textContent=String(dH).padStart(2,'0');
  document.getElementById('m').textContent=String(dM).padStart(2,'0');
  document.getElementById('s').textContent=String(dS).padStart(2,'0');
}

let light=false;
function toggleTheme(){
  light=!light;
  document.documentElement.style.setProperty('--bg',light?'#f9f9f9':'#0a0a0a');
  document.documentElement.style.setProperty('--surface',light?'#efefef':'#131313');
  document.documentElement.style.setProperty('--border',light?'#e0e0e0':'#222');
  document.documentElement.style.setProperty('--text',light?'#111':'#f0f0f0');
  document.documentElement.style.setProperty('--muted',light?'#555':'#888');
  document.documentElement.style.setProperty('--dim',light?'#777':'#444');
  document.body.style.background=light?'#f9f9f9':'#0a0a0a';
  document.body.style.color=light?'#111':'#f0f0f0';
  document.getElementById('theme-btn').textContent=light?'🌙 Koyu mod':'☀ Açık mod';
}

const aylar=[...new Set(DATA.map(r=>r.ay))];
let aktifAy=getBugun()?.ay||aylar[0];
function renderTable(){
  const tbody=document.getElementById('tbody');const bt=todayStr();tbody.innerHTML='';
  DATA.filter(r=>r.ay===aktifAy).forEach(r=>{
    if(r.k){const s=document.createElement('tr');s.className='kadir';s.innerHTML=`<td colspan="8">✦ Kadir Gecesi — 16 Mart 2026</td>`;tbody.appendChild(s);}
    const tr=document.createElement('tr');if(r.t===bt)tr.classList.add('today');
    tr.innerHTML=`<td style="color:#2e2e2e;font-size:12px">${r.n}</td><td class="td-date">${r.d}</td><td>${r.i}</td><td>${r.g}</td><td>${r.o}</td><td>${r.ik}</td><td class="td-iftar">${r.a}</td><td>${r.y}</td>`;
    tbody.appendChild(tr);
  });
}
function buildTabs(){
  const c=document.getElementById('tabs');
  aylar.forEach(ay=>{
    const b=document.createElement('button');b.className='tab'+(ay===aktifAy?' active':'');b.textContent=ay;
    b.onclick=()=>{aktifAy=ay;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderTable();};
    c.appendChild(b);
  });
}

buildTabs();renderTable();
setInterval(tick,1000);tick();
</script>
